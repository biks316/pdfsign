{% extends 'base.html' %}
{% block content %}
<section class="page-hero"><div class="container"><h1>Create Account</h1><p>Sign up with email/password or Google.</p></div></section>
<section class="section"><div class="container form-wrap"><div class="card form-card"><form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn" type="submit">Create Account</button></form></div><div class="card"><h2>Prefer OAuth?</h2><a class="btn" href="/accounts/google/login/">Sign Up with Google</a><p class="helper">Configure Google SocialApp in admin to enable this route.</p></div></div></section>
{% endblock %}
