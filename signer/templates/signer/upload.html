{% extends 'signer/base.html' %}

{% block content %}
<section class="card">
  <h2>Upload PDF</h2>
  <p>Select a PDF file to begin signing.</p>

  {% if error_message %}
    <div class="alert">{{ error_message }}</div>
  {% endif %}

  <form method="post" enctype="multipart/form-data" class="form-stack">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Upload and Continue</button>
  </form>
</section>
{% endblock %}
