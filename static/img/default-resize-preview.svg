<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Resize Demo Illustration</title>
  <desc id="desc">A simple camera and crop frame illustration to represent image resizing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#dce9ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f9ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <g opacity="0.35">
    <circle cx="130" cy="120" r="76" fill="#b6d0ff"/>
    <circle cx="1080" cy="660" r="92" fill="#bdd5ff"/>
  </g>
  <rect x="240" y="120" width="720" height="510" rx="28" fill="url(#card)" stroke="#bdd1f7" stroke-width="4"/>
  <rect x="280" y="184" width="640" height="382" rx="20" fill="#e9f1ff" stroke="#c1d5fa" stroke-width="3"/>
  <g>
    <rect x="360" y="250" width="480" height="250" rx="14" fill="#ffffff" stroke="#7ea8f4" stroke-width="4"/>
    <path d="M360 460 L520 320 L620 400 L700 350 L840 470" fill="#d4e5ff" stroke="#7ea8f4" stroke-width="4"/>
    <circle cx="730" cy="295" r="32" fill="#a9c9ff"/>
  </g>
  <g stroke="#2f72ff" stroke-width="8" stroke-linecap="round">
    <path d="M412 292h52"/>
    <path d="M412 292v52"/>
    <path d="M788 292h-52"/>
    <path d="M788 292v52"/>
    <path d="M412 458h52"/>
    <path d="M412 458v-52"/>
    <path d="M788 458h-52"/>
    <path d="M788 458v-52"/>
  </g>
  <text x="600" y="104" text-anchor="middle" fill="#33507e" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Resize Image Workspace</text>
</svg>
